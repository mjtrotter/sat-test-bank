services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: vanguard
      POSTGRES_PASSWORD: vanguard
      POSTGRES_DB: vanguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vanguard:vanguard@db:5432/vanguard
      DEBUG: "true"
    depends_on:
      - db

volumes:
  pgdata:
